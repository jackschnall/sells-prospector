const StateDetailPanel = React.memo(function StateDetailPanel({ code, accounts, onClose, focusAccount, onFocusAccount, selectedCounty, onSelectCounty, onExport }) {
  const stateAccounts = useMemo(() => (
    accounts.filter(a => a.state === code)
  ), [accounts, code]);

  // County breakdown (always over the full state, regardless of county filter)
  const counties = useMemo(() => {
    const m = new Map();
    for (const a of stateAccounts) {
      const fips = a.countyFips || 'unknown';
      const name = a.county || 'Unknown county';
      if (!m.has(fips)) m.set(fips, { fips, name, count: 0 });
      m.get(fips).count++;
    }
    return [...m.values()].sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
  }, [stateAccounts]);
  const countyMax = counties.length ? counties[0].count : 1;
  const selectedCountyName = selectedCounty
    ? (counties.find(c => c.fips === selectedCounty)?.name || 'this county')
    : null;

  // Accounts visible in the list — scoped to the selected county if one is set.
  const visibleAccounts = useMemo(() => (
    selectedCounty ? stateAccounts.filter(a => (a.countyFips || 'unknown') === selectedCounty) : stateAccounts
  ), [stateAccounts, selectedCounty]);

  // Group visible accounts by city
  const grouped = useMemo(() => {
    const m = new Map();
    for (const a of visibleAccounts) {
      const city = (a.city || 'Unknown').trim();
      if (!m.has(city)) m.set(city, []);
      m.get(city).push(a);
    }
    return [...m.entries()]
      .map(([city, list]) => ({
        city,
        list: list.sort((a, b) => (b.lastActivity || '').localeCompare(a.lastActivity || ''))
      }))
      .sort((a, b) => b.list.length - a.list.length || a.city.localeCompare(b.city));
  }, [visibleAccounts]);

  const recency = useMemo(() => {
    let hot = 0, warm = 0, cold = 0, nocontact = 0;
    for (const a of visibleAccounts) {
      const b = activityBand(daysAgo(a.lastActivity));
      if (b === 'hot') hot++;
      else if (b === 'warm') warm++;
      else if (b === 'cold') cold++;
      else nocontact++;
    }
    return { hot, warm, cold, nocontact };
  }, [visibleAccounts]);

  const cityCount = grouped.length;

  return (
    <React.Fragment>
      <div className="panel-header">
        <div className="panel-header__main">
          <div className="panel-header__eyebrow">{code}</div>
          <h2 className="panel-header__title">{STATE_NAME[code] || code}</h2>
          <div className="panel-header__sub">
            {selectedCounty
              ? <React.Fragment>{visibleAccounts.length} {visibleAccounts.length === 1 ? 'account' : 'accounts'} in {selectedCountyName}</React.Fragment>
              : <React.Fragment>{stateAccounts.length} {stateAccounts.length === 1 ? 'account' : 'accounts'} across {counties.length} {counties.length === 1 ? 'county' : 'counties'}, {cityCount} {cityCount === 1 ? 'city' : 'cities'}</React.Fragment>}
          </div>
        </div>
        <div className="panel-header__actions">
          <ExportButton onExport={onExport} />
          <CreateCampaignButton accounts={stateAccounts} />
          <button className="panel-close" onClick={onClose} aria-label="Close state detail">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <div className="state-summary">
        <div className="state-summary__item">
          <div className="state-summary__label">Active ≤90d</div>
          <div className="state-summary__value">{recency.hot}</div>
        </div>
        <div className="state-summary__item">
          <div className="state-summary__label">90d–1y</div>
          <div className="state-summary__value">{recency.warm}</div>
        </div>
        <div className="state-summary__item">
          <div className="state-summary__label">Stale 1y+</div>
          <div className="state-summary__value">{recency.cold}</div>
        </div>
      </div>

      <div className="panel-body">
        {stateAccounts.length === 0 ? (
          <div className="empty-state">
            <svg className="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
              <path d="M12 21s-7-6-7-12a7 7 0 0 1 14 0c0 6-7 12-7 12Z" />
              <circle cx="12" cy="9" r="2.5" />
            </svg>
            <div className="empty-state__title">No accounts here yet</div>
            <div className="empty-state__body">No matches in {STATE_NAME[code]} for the current filter.</div>
          </div>
        ) : (
          <React.Fragment>
            {counties.length > 1 && (
              <div className="overview-section">
                <div className="overview-section__head">
                  <div className="overview-section__title">Counties</div>
                  <div className="overview-section__hint">
                    {counties.length} with presence · click to filter
                  </div>
                </div>
                <div className="leaderboard">
                  {counties.map((c, i) => {
                    const active = selectedCounty === c.fips;
                    return (
                      <div
                        key={c.fips}
                        className={'leaderboard__row' + (active ? ' leaderboard__row--active' : '')}
                        onClick={() => onSelectCounty(active ? null : c.fips)}
                      >
                        <div className="leaderboard__rank">{i + 1}</div>
                        <div>
                          <div className="leaderboard__name">{shortCounty(c.name)}</div>
                          <div className="leaderboard__name-sub">{c.fips === 'unknown' ? '—' : c.name.replace(shortCounty(c.name), '').trim() || 'County'}</div>
                        </div>
                        <div className="leaderboard__count">{c.count}</div>
                        <div className="leaderboard__bar">
                          <div className="leaderboard__bar-fill" style={{ width: `${(c.count / countyMax) * 100}%` }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            <div className="account-list">
              {selectedCounty && (
                <div className="county-filter-bar">
                  <span className="county-filter-bar__label">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <path d="M12 21s-7-6-7-12a7 7 0 0 1 14 0c0 6-7 12-7 12Z" />
                      <circle cx="12" cy="9" r="2.5" />
                    </svg>
                    {selectedCountyName}
                  </span>
                  <button className="county-filter-bar__clear" onClick={() => onSelectCounty(null)}>
                    Clear ✕
                  </button>
                </div>
              )}
              {grouped.map(({ city, list }) => (
                <div key={city} className="account-group">
                  <div className="account-group__head">
                    <div className="account-group__city">{titleCase(city)}</div>
                    <div className="account-group__count">{list.length} {list.length === 1 ? 'account' : 'accounts'}</div>
                  </div>
                  {list.map((a, i) => {
                    const d = daysAgo(a.lastActivity);
                    const band = activityBand(d);
                    const isFocused = focusAccount && focusAccount.name === a.name;
                    return (
                      <div
                        key={a.name + i}
                        className="account-row"
                        onClick={() => onFocusAccount(a)}
                        style={isFocused ? { background: 'var(--sells-blue-050)' } : null}
                      >
                        <div className={`account-row__dot account-row__dot--${band}`} />
                        <div className="account-row__main">
                          <div className="account-row__name">{a.name}</div>
                          <div className="account-row__meta">{a.street}{a.zip ? ` · ${a.zip}` : ''}</div>
                        </div>
                        <div className="account-row__activity">
                          <strong>{formatDaysAgo(d)}</strong>
                          <span>{a.lastActivity ? 'last activity' : 'no activity'}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </React.Fragment>
        )}
      </div>
    </React.Fragment>
  );
});

// ------------------------------------------------------------------
// Tooltip
// ------------------------------------------------------------------
function Tooltip({ data }) {
  if (!data) return null;
  if (data.variant === 'pin') {
    return (
      <div className="map-tooltip map-tooltip--pin" style={{ transform: `translate3d(${data.x}px, ${data.y}px, 0) translate(-50%, -100%)` }}>
        <div className="map-tooltip__name">{data.name}</div>
        {data.meta && (
          <div className="map-tooltip__pin-meta">
            <span className={'map-tooltip__dot map-tooltip__dot--' + data.band} />
            {data.meta}
          </div>
        )}
      </div>
    );
  }
  return (
    <div className="map-tooltip" style={{ transform: `translate3d(${data.x}px, ${data.y}px, 0) translate(-50%, -100%)` }}>
      <div className="map-tooltip__name">{data.name}</div>
      <div className="map-tooltip__count">
        {data.count
          ? `${data.count} ${data.count === 1 ? 'account' : 'accounts'}`
          : 'No accounts'}
      </div>
      {data.metricLine && (
        <div className="map-tooltip__metric">{data.metricLine}</div>
      )}
      {data.topCity && (
        <div className="map-tooltip__top">Top: {data.topCity}</div>
      )}
    </div>
  );
}

// ------------------------------------------------------------------
// Root App
// ------------------------------------------------------------------
function App() {
  // ------ Data load ------
  // counties-10m.json bundles nation + states + counties, so a single fetch
  // powers both the national choropleth and the county drill-down.
  const [statesGeo, setStatesGeo] = useState(null);
  const [countiesGeo, setCountiesGeo] = useState(null);
  useEffect(() => {
    fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json')
      .then(r => r.json())
      .then(topo => {
        setStatesGeo(topojson.feature(topo, topo.objects.states));
        setCountiesGeo(topojson.feature(topo, topo.objects.counties));
      })
      .catch(err => {
        console.error('Failed to load us-atlas', err);
      });
  }, []);

  // ------ State ------
  const [selectedState, setSelectedState] = useState(null);
  const [selectedCounty, setSelectedCounty] = useState(null);
  const [tooltip, setTooltip] = useState(null);
  // Tooltip updates are throttled to one per animation frame so cursor
  // movement never floods React with re-renders.
  const tipRaf = useRef(0);
  const tipPending = useRef(null);
  const setTooltipThrottled = useCallback((data) => {
    tipPending.current = data;
    if (tipRaf.current) return;
    tipRaf.current = requestAnimationFrame(() => {
      tipRaf.current = 0;
      setTooltip(tipPending.current);
    });
  }, []);
  const [search, setSearch] = useState('');
  const [recency, setRecency] = useState('all');
  const [focusAccount, setFocusAccount] = useState(null);
  const [metric, setMetric] = useState('count'); // count | percap | gap
  const [denom, setDenom] = useState('pop');      // pop | biz
  const [placesGeo, setPlacesGeo] = useState(null); // city/place boundaries for the zoomed county
  const placesCache = useRef({});

  // Report Mode state
  const [reportMode, setReportMode] = useState(false);
  const [selectedStates, setSelectedStates] = useState(new Set());
  const [reportFilters, setReportFilters] = useState({ industry: '', tier: '', pipeline: '' });

  const allAccounts = window.ACCOUNTS || [];
  const STATE_STATS = window.STATE_STATS || {};
  const COUNTY_STATS = window.COUNTY_STATS || {};

  // Filter by recency
  const accounts = useMemo(() => {
    if (recency === 'all') return allAccounts;
    return allAccounts.filter(a => {
      const d = daysAgo(a.lastActivity);
      return activityBand(d) === recency;
    });
  }, [allAccounts, recency]);

  // Recency counts (always over full dataset)
  const recencyCounts = useMemo(() => {
    let hot = 0, warm = 0, cold = 0, nocontact = 0;
    for (const a of allAccounts) {
      const b = activityBand(daysAgo(a.lastActivity));
      if (b === 'hot') hot++;
      else if (b === 'warm') warm++;
      else if (b === 'cold') cold++;
      else nocontact++;
    }
    return { all: allAccounts.length, hot, warm, cold, nocontact };
  }, [allAccounts]);

  // Report mode: filtered accounts based on selected states + criteria
  const reportAccounts = useMemo(() => {
    if (!reportMode) return [];
    let filtered = accounts;
    if (selectedStates.size > 0) {
      filtered = filtered.filter(a => selectedStates.has(a.state));
    }
    if (reportFilters.industry) {
      filtered = filtered.filter(a => a.industry === reportFilters.industry);
    }
    if (reportFilters.tier) {
      filtered = filtered.filter(a => a.tier === reportFilters.tier);
    }
    if (reportFilters.pipeline) {
      filtered = filtered.filter(a => a.pipeline_stage === reportFilters.pipeline);
    }
    return filtered;
  }, [reportMode, accounts, selectedStates, reportFilters]);

  // State counts (filtered)
  const stateCounts = useMemo(() => {
    const m = {};
    for (const a of accounts) m[a.state] = (m[a.state] || 0) + 1;
    return m;
  }, [accounts]);

  // City counts (filtered)
  const cityCounts = useMemo(() => {
    const m = {};
    for (const a of accounts) {
      const key = `${(a.city||'').trim().toUpperCase()}||${a.state}`;
      m[key] = (m[key] || 0) + 1;
    }
    return m;
  }, [accounts]);

  // County counts (filtered) keyed by 5-digit FIPS — powers the drill-down choropleth
  const countyCounts = useMemo(() => {
    const m = {};
    for (const a of accounts) if (a.countyFips) m[a.countyFips] = (m[a.countyFips] || 0) + 1;
    return m;
  }, [accounts]);

  // State-scoped stats for the KPI tiles when drilled into a state
  const stateScope = useMemo(() => {
    if (!selectedState) return null;
    const list = accounts.filter(a => a.state === selectedState);
    const counties = new Set(list.map(a => a.countyFips).filter(Boolean));
    const cities = new Set(list.map(a => (a.city || '').trim().toUpperCase()).filter(Boolean));
    const cc = {};
    for (const a of list) if (a.countyFips) cc[a.countyFips] = (cc[a.countyFips] || 0) + 1;
    let topFips = null, topN = 0;
    for (const [k, v] of Object.entries(cc)) if (v > topN) { topN = v; topFips = k; }
    const topName = topFips ? (list.find(a => a.countyFips === topFips)?.county || '') : '';
    return { accounts: list.length, counties: counties.size, cities: cities.size, topName: shortCounty(topName), topN };
  }, [accounts, selectedState]);

  const selectedCountyName = useMemo(() => {
    if (!selectedCounty) return null;
    const a = allAccounts.find(x => x.countyFips === selectedCounty);
    return a ? a.county : null;
  }, [selectedCounty, allAccounts]);

  // fips -> county name (covers open/zero-account counties too, from geometry)
  const countyNameByFips = useMemo(() => {
    const m = {};
    if (countiesGeo) for (const f of countiesGeo.features) {
      const nm = f.properties && f.properties.name;
      if (nm) m[String(f.id).padStart(5, '0')] = nm;
    }
    return m;
  }, [countiesGeo]);

  // Active choropleth view for the current metric/denominator (null when metric==='count').
  const metricView = useMemo(() => {
    if (metric === 'count') return null;
    if (!selectedState) {
      return buildMetricView({ ids: Object.keys(STATE_STATS), countById: stateCounts, statById: STATE_STATS, metric, denom });
    }
    const sf = CODE_TO_FIPS[selectedState];
    const ids = Object.keys(COUNTY_STATS).filter(f => f.slice(0, 2) === sf);
    return buildMetricView({ ids, countById: countyCounts, statById: COUNTY_STATS, metric, denom });
  }, [metric, denom, selectedState, stateCounts, countyCounts]);

  // Auto-generated insight chips for the strip above the map.
  const insights = useMemo(() => computeInsights({
    metric, denom, selectedState, selectedCounty,
    accounts, stateCounts, countyCounts,
    STATE_STATS, COUNTY_STATS, countyNameByFips, recencyCounts, stateScope
  }), [metric, denom, selectedState, selectedCounty, accounts, stateCounts, countyCounts, countyNameByFips, recencyCounts, stateScope]);

  // Lazily fetch incorporated-place (city) boundaries for the zoomed county
  // from TIGERweb (Census ArcGIS REST — GeoJSON, generalized, no key). Cached by FIPS.
  useEffect(() => {
    if (!selectedCounty || !countiesGeo) { setPlacesGeo(null); return; }
    const fips = selectedCounty;
    if (placesCache.current[fips]) { setPlacesGeo(placesCache.current[fips]); return; }
    setPlacesGeo(null);
    const feat = countiesGeo.features.find(f => String(f.id).padStart(5, '0') === fips);
    if (!feat) return;
    let cancelled = false;
    const [[w, s], [e, n]] = d3.geoBounds(feat);
    const url = 'https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/tigerWMS_Current/MapServer/28/query'
      + `?where=1%3D1&geometry=${w},${s},${e},${n}&geometryType=esriGeometryEnvelope&inSR=4326`
      + '&spatialRel=esriSpatialRelIntersects&outFields=NAME&returnGeometry=true&outSR=4326'
      + '&maxAllowableOffset=0.0025&geometryPrecision=4&f=geojson';
    fetch(url)
      .then(r => r.json())
      .then(g => { if (!cancelled) { placesCache.current[fips] = g; setPlacesGeo(g); } })
      .catch(() => { if (!cancelled) setPlacesGeo(null); });
    return () => { cancelled = true; };
  }, [selectedCounty, countiesGeo]);

  // Search results
  const searchResults = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return [];
    const results = [];
    const seenStates = new Set();
    const seenCities = new Set();
    // States
    for (const [code, name] of Object.entries(STATE_NAME)) {
      if (name.toLowerCase().includes(q) || code.toLowerCase() === q) {
        if (stateCounts[code]) {
          results.push({ kind: 'State', name, where: `${stateCounts[code]} accounts`, code });
          seenStates.add(code);
        }
      }
    }
    // Cities
    for (const a of accounts) {
      const c = (a.city || '').toLowerCase();
      if (c.includes(q)) {
        const key = `${c}|${a.state}`;
        if (seenCities.has(key)) continue;
        seenCities.add(key);
        results.push({ kind: 'City', name: titleCase(a.city), where: STATE_NAME[a.state], code: a.state, account: null });
      }
      if (results.length > 50) break;
    }
    // Accounts
    for (const a of accounts) {
      if (a.name.toLowerCase().includes(q)) {
        results.push({ kind: 'Account', name: a.name, where: `${titleCase(a.city||'')}, ${a.state}`, code: a.state, account: a });
      }
      if (results.length > 80) break;
    }
    return results;
  }, [search, accounts, stateCounts]);

  // ------ Handlers ------
  const onSelectState = useCallback((code) => {
    if (reportMode) {
      // In report mode, toggle state in multi-select
      setSelectedStates(prev => {
        const next = new Set(prev);
        if (next.has(code)) next.delete(code);
        else next.add(code);
        return next;
      });
    } else {
      setSelectedState(code);
      setSelectedCounty(null);
      setFocusAccount(null);
    }
  }, [reportMode]);

  const onClosePanel = useCallback(() => {
    setSelectedState(null);
    setSelectedCounty(null);
    setFocusAccount(null);
  }, []);

  const onHoverState = useCallback((code, evt) => {
    if (!code || !evt) { setTooltipThrottled(null); return; }
    const n = stateCounts[code] || 0;
    setTooltipThrottled({
      x: evt.clientX,
      y: evt.clientY - 12,
      name: STATE_NAME[code] || code,
      count: n,
      topCity: topCityForState(code, accounts),
      metricLine: metricLineFor(metric, denom, n, (STATE_STATS[code] || {})[denom] || 0)
    });
  }, [stateCounts, accounts, metric, denom, setTooltipThrottled]);

  const onHoverCounty = useCallback((fips, evt, geomName) => {
    if (!fips || !evt) { setTooltipThrottled(null); return; }
    const acct = accounts.find(a => a.countyFips === fips);
    const name = acct ? acct.county : (geomName ? `${geomName} County` : 'County');
    const n = countyCounts[fips] || 0;
    setTooltipThrottled({
      x: evt.clientX,
      y: evt.clientY - 12,
      name,
      count: n,
      topCity: topCityForCounty(fips, accounts),
      metricLine: metricLineFor(metric, denom, n, (COUNTY_STATS[fips] || {})[denom] || 0)
    });
  }, [countyCounts, accounts, metric, denom, setTooltipThrottled]);

  const onHoverPin = useCallback((acct, evt) => {
    if (!acct || !evt) { setTooltipThrottled(null); return; }
    const d = daysAgo(acct.lastActivity);
    const city = titleCase(acct.city || '');
    setTooltipThrottled({
      x: evt.clientX,
      y: evt.clientY - 12,
      variant: 'pin',
      name: acct.name,
      band: activityBand(d),
      meta: `${city}${city ? ' · ' : ''}${formatDaysAgo(d)}`
    });
  }, [setTooltipThrottled]);

  const onPinClick = useCallback((acct) => {
    if (!acct) return;
    if (acct.countyFips) setSelectedCounty(acct.countyFips);
    setFocusAccount(acct);
  }, []);

  // Export the currently-scoped accounts (respects recency + state + county) to CSV.
  const onExport = useCallback(() => {
    let rows = accounts;
    let label = 'all';
    if (selectedState) {
      rows = rows.filter(a => a.state === selectedState);
      label = selectedState;
      if (selectedCounty) {
        rows = rows.filter(a => (a.countyFips || '') === selectedCounty);
        label = `${selectedState}-${shortCounty(selectedCountyName || selectedCounty).replace(/\s+/g, '')}`;
      }
    }
    const stamp = recency === 'all' ? '' : `-${recency}`;
    downloadCsv(`sells-accounts-${label}${stamp}.csv`, buildCsv(rows));
  }, [accounts, selectedState, selectedCounty, selectedCountyName, recency]);

  const onPickResult = useCallback((r) => {
    setSearch('');
    if (r.code) setSelectedState(r.code);
    if (r.account) setFocusAccount(r.account);
  }, []);

  return (
    <div className="app">
      <Header
        search={search}
        onSearch={setSearch}
        results={searchResults}
        onPickResult={onPickResult}
        activeRecency={recency}
        setRecency={setRecency}
        recencyCounts={recencyCounts}
        reportMode={reportMode}
        setReportMode={setReportMode}
      />

      <div className="app-main">
        <div className="map-pane">
          <div className="map-toolbar">
            <div className="map-toolbar__insights">
              {insights.map((t, i) => (
                <div key={i} className="insight-chip">
                  <span className="insight-chip__dot" />
                  {t}
                </div>
              ))}
            </div>
            {!selectedCounty && (
              <div className="map-toolbar__controls">
                <div className="seg" role="group" aria-label="Shading metric">
                  {[['count', 'Count'], ['percap', 'Per capita'], ['gap', 'Gaps']].map(([k, lbl]) => (
                    <button
                      key={k}
                      className={'seg__btn' + (metric === k ? ' is-active' : '')}
                      onClick={() => setMetric(k)}
                    >{lbl}</button>
                  ))}
                </div>
                {metric !== 'count' && (
                  <div className="seg seg--sub" role="group" aria-label="Denominator">
                    {Object.entries(DENOM_CFG).map(([k, c]) => (
                      <button
                        key={k}
                        className={'seg__btn' + (denom === k ? ' is-active' : '')}
                        onClick={() => setDenom(k)}
                      >{c.label}</button>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>

          <div className="map-stage">
          <div className="map-stats">
            {stateScope ? (
              <React.Fragment>
                <div className="kpi">
                  <div className="kpi__label">Accounts</div>
                  <div className="kpi__value">{stateScope.accounts}</div>
                  <div className="kpi__sub">in {STATE_NAME[selectedState] || selectedState}</div>
                </div>
                <div className="kpi">
                  <div className="kpi__label">Counties</div>
                  <div className="kpi__value">{stateScope.counties}</div>
                  <div className="kpi__sub">with presence</div>
                </div>
                <div className="kpi">
                  <div className="kpi__label">Cities</div>
                  <div className="kpi__value">{stateScope.cities}</div>
                  <div className="kpi__sub">distinct</div>
                </div>
                <div className="kpi">
                  <div className="kpi__label">Top county</div>
                  <div className="kpi__value kpi__value--sm">{stateScope.topName || '—'}</div>
                  <div className="kpi__sub">{stateScope.topN} accounts</div>
                </div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <div className="kpi">
                  <div className="kpi__label">Accounts</div>
                  <div className="kpi__value">{accounts.length}</div>
                  <div className="kpi__sub">{recency === 'all' ? 'in dataset' : `of ${recencyCounts.all} total`}</div>
                </div>
                <div className="kpi">
                  <div className="kpi__label">States</div>
                  <div className="kpi__value">{Object.keys(stateCounts).length}</div>
                  <div className="kpi__sub">with presence</div>
                </div>
                <div className="kpi">
                  <div className="kpi__label">Cities</div>
                  <div className="kpi__value">{Object.keys(cityCounts).length}</div>
                  <div className="kpi__sub">distinct</div>
                </div>
                <div className="kpi">
                  <div className="kpi__label">Top state</div>
                  <div className="kpi__value">{topState(stateCounts).code || '—'}</div>
                  <div className="kpi__sub">{topState(stateCounts).n} accounts</div>
                </div>
              </React.Fragment>
            )}
          </div>

            {selectedState ? (
              <React.Fragment>
                <button
                  className="map-back"
                  onClick={selectedCounty ? () => setSelectedCounty(null) : onClosePanel}
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2">
                    <path d="m15 18-6-6 6-6" />
                  </svg>
                  {selectedCounty ? (STATE_NAME[selectedState] || selectedState) : 'All states'}
                </button>
                <div className="map-drill-title">
                  {selectedCounty ? (
                    <React.Fragment>
                      <span className="map-drill-title__eyebrow">{selectedState} · County</span>
                      <span className="map-drill-title__name">{shortCounty(selectedCountyName || 'County')}</span>
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <span className="map-drill-title__eyebrow">{selectedState}</span>
                      <span className="map-drill-title__name">{STATE_NAME[selectedState] || selectedState} — by county</span>
                    </React.Fragment>
                  )}
                </div>
                <CountyMap
                  stateCode={selectedState}
                  countiesGeo={countiesGeo}
                  countyCounts={countyCounts}
                  selectedCounty={selectedCounty}
                  onSelectCounty={setSelectedCounty}
                  onHoverCounty={onHoverCounty}
                  accounts={accounts}
                  focusAccount={focusAccount}
                  onHoverPin={onHoverPin}
                  onPinClick={onPinClick}
                  fillMap={(!selectedCounty && metricView) ? metricView.fillById : null}
                  showLabels={metric === 'count'}
                  placesGeo={placesGeo}
                />
              </React.Fragment>
            ) : (
              <ChoroplethMap
                statesGeo={statesGeo}
                stateCounts={stateCounts}
                selectedState={selectedState}
                onSelectState={onSelectState}
                onHoverState={onHoverState}
                dimEmpty={!!selectedState}
                fillMap={metricView ? metricView.fillById : null}
                showLabels={metric === 'count'}
                reportMode={reportMode}
                selectedStates={selectedStates}
              />
            )}

          <div className="map-legend">
            {selectedCounty ? (
              <React.Fragment>
                <div className="map-legend__label">Account activity</div>
                <div className="map-legend__scale map-legend__scale--dots">
                  {[
                    { label: 'Active ≤90d', color: '#102772' },
                    { label: '90d–1y', color: '#EFB64E' },
                    { label: 'Stale 1y+', color: '#B8B8B0' }
                  ].map((b, i) => (
                    <div key={i} className="map-legend__bin map-legend__bin--dot">
                      <span className="map-legend__dot" style={{ background: b.color }} />
                      <div className="map-legend__tick">{b.label}</div>
                    </div>
                  ))}
                </div>
              </React.Fragment>
            ) : metricView ? (
              <React.Fragment>
                <div className="map-legend__label">{metricView.label}</div>
                <div className="map-legend__scale">
                  {metricView.items.map((b, i) => (
                    <div key={i} className="map-legend__bin">
                      <div className="map-legend__swatch" style={{ background: b.color, width: 56 }} />
                      <div className="map-legend__tick">{b.range}</div>
                    </div>
                  ))}
                </div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <div className="map-legend__label">{selectedState ? 'Accounts per county' : 'Accounts per state'}</div>
                <div className="map-legend__scale">
                  {(selectedState ? COUNTY_BIN_LABELS : BIN_LABELS).map((b, i) => (
                    <div key={i} className="map-legend__bin">
                      <div className="map-legend__swatch" style={{ background: b.color, width: 56 }} />
                      <div className="map-legend__tick">{b.range}</div>
                    </div>
                  ))}
                </div>
              </React.Fragment>
            )}
          </div>

          {!selectedState && metric === 'count' && (
            <div className="map-handoff">
              <div className="map-handoff__label">Hand-off note</div>
              <div className="map-handoff__body">
                County shading is geocoded from each account's address (Census geocoder).
                Click a state to drill into counties; click a county to filter the list.
              </div>
            </div>
          )}
          </div>

          <Tooltip data={tooltip} />
        </div>

        <aside className="side-panel">
          {reportMode ? (
            <div className="panel">
              <div className="panel-header">
                <div>
                  <div className="panel-header__eyebrow" style={{ color: 'var(--sells-blue)' }}>Report Mode</div>
                  <h2 className="panel-header__title">Build a Target List</h2>
                  <div className="panel-header__sub">
                    Click states on the map to select them. Set criteria below to filter accounts.
                  </div>
                </div>
              </div>

              <div className="panel-body" style={{ padding: '16px 20px' }}>
                {/* Selected states */}
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: '0.75rem', fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>
                    Selected States {selectedStates.size > 0 && <span style={{ color: 'var(--sells-blue)' }}>({selectedStates.size})</span>}
                  </div>
                  {selectedStates.size === 0 ? (
                    <div style={{ fontSize: '0.85rem', color: '#bbb', fontStyle: 'italic' }}>Click states on the map to select</div>
                  ) : (
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                      {[...selectedStates].sort().map(s => (
                        <button key={s} onClick={() => setSelectedStates(prev => { const n = new Set(prev); n.delete(s); return n; })}
                          style={{ padding: '3px 10px', fontSize: '0.8rem', fontWeight: 600, background: 'var(--sells-blue)', color: '#fff',
                            border: 'none', borderRadius: 4, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4 }}>
                          {s} <span style={{ fontSize: '0.7rem' }}>×</span>
                        </button>
                      ))}
                      <button onClick={() => setSelectedStates(new Set())}
                        style={{ padding: '3px 8px', fontSize: '0.75rem', background: '#f0f0f0', color: '#666', border: 'none', borderRadius: 4, cursor: 'pointer' }}>
                        Clear all
                      </button>
                    </div>
                  )}
                </div>

                {/* Criteria filters */}
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: '0.75rem', fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>Criteria</div>

                  <label style={{ display: 'block', fontSize: '0.8rem', fontWeight: 600, color: '#555', marginBottom: 4 }}>Industry</label>
                  <select value={reportFilters.industry} onChange={e => setReportFilters(f => ({...f, industry: e.target.value}))}
                    style={{ width: '100%', padding: '6px 8px', fontSize: '0.85rem', borderRadius: 4, border: '1px solid #ddd', marginBottom: 10 }}>
                    <option value="">All Industries</option>
                    {[...new Set(accounts.map(a => a.industry).filter(Boolean))].sort().map(ind => (
                      <option key={ind} value={ind}>{ind}</option>
                    ))}
                  </select>

                  <label style={{ display: 'block', fontSize: '0.8rem', fontWeight: 600, color: '#555', marginBottom: 4 }}>Tier</label>
                  <select value={reportFilters.tier} onChange={e => setReportFilters(f => ({...f, tier: e.target.value}))}
                    style={{ width: '100%', padding: '6px 8px', fontSize: '0.85rem', borderRadius: 4, border: '1px solid #ddd', marginBottom: 10 }}>
                    <option value="">All Tiers</option>
                    <option value="strong-buy">Prime</option>
                    <option value="watchlist">Possible</option>
                    <option value="pass">Poor</option>
                  </select>

                  <label style={{ display: 'block', fontSize: '0.8rem', fontWeight: 600, color: '#555', marginBottom: 4 }}>Pipeline Stage</label>
                  <select value={reportFilters.pipeline} onChange={e => setReportFilters(f => ({...f, pipeline: e.target.value}))}
                    style={{ width: '100%', padding: '6px 8px', fontSize: '0.85rem', borderRadius: 4, border: '1px solid #ddd', marginBottom: 10 }}>
                    <option value="">All Stages</option>
                    <option value="no_contact">No Contact</option>
                    <option value="outreach_started">Outreach Started</option>
                    <option value="initial_contact">Initial Contact</option>
                    <option value="relationship_established">Relationship Established</option>
                    <option value="prep">Prep</option>
                    <option value="market">Market</option>
                    <option value="loi">LOI</option>
                    <option value="close">Close</option>
                  </select>
                </div>

                {/* Results count */}
                <div style={{ padding: '12px 16px', background: '#f8f7f2', borderRadius: 6, marginBottom: 16, textAlign: 'center' }}>
                  <div style={{ fontSize: '2rem', fontWeight: 800, color: 'var(--sells-blue)' }}>{reportAccounts.length}</div>
                  <div style={{ fontSize: '0.8rem', color: '#888' }}>accounts match your criteria</div>
                </div>

                {/* Action buttons */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <button onClick={() => {
                    if (reportAccounts.length === 0) return;
                    if (window.parent && window.parent !== window) {
                      window.parent.postMessage({
                        type: 'map-create-campaign',
                        companyIds: reportAccounts.filter(a => a.id).map(a => a.id),
                        count: reportAccounts.length,
                      }, '*');
                    }
                  }} style={{
                    padding: '10px 0', background: 'var(--sells-gold, #EFB64E)', color: 'var(--sells-blue, #102772)',
                    border: 'none', borderRadius: 6, fontSize: '0.9rem', fontWeight: 600, cursor: 'pointer',
                    opacity: reportAccounts.length === 0 ? 0.5 : 1,
                  }}>
                    Create Campaign ({reportAccounts.length})
                  </button>
                  <button onClick={() => {
                    if (reportAccounts.length === 0) return;
                    const stamp = selectedStates.size > 0 ? [...selectedStates].sort().join('-') : 'all';
                    downloadCsv(`sells-report-${stamp}.csv`, buildCsv(reportAccounts));
                  }} style={{
                    padding: '10px 0', background: '#fff', color: 'var(--sells-gray, #494840)',
                    border: '1px solid #ddd', borderRadius: 6, fontSize: '0.9rem', fontWeight: 600, cursor: 'pointer',
                    opacity: reportAccounts.length === 0 ? 0.5 : 1,
                  }}>
                    Export CSV ({reportAccounts.length})
                  </button>
                </div>

                {/* Account list preview */}
                {reportAccounts.length > 0 && reportAccounts.length <= 50 && (
                  <div style={{ marginTop: 16, maxHeight: 300, overflowY: 'auto' }}>
                    <div style={{ fontSize: '0.75rem', fontWeight: 700, color: '#888', textTransform: 'uppercase', marginBottom: 6 }}>Preview</div>
                    {reportAccounts.slice(0, 50).map((a, i) => (
                      <div key={a.id || i} style={{ padding: '4px 0', borderBottom: '1px solid #eee', fontSize: '0.82rem', cursor: 'pointer', display: 'flex', justifyContent: 'space-between' }}
                        onClick={() => setFocusAccount(a)}>
                        <span style={{ fontWeight: 600 }}>{a.name}</span>
                        <span style={{ color: '#999' }}>{a.city}, {a.state}</span>
                      </div>
                    ))}
                    {reportAccounts.length > 50 && (
                      <div style={{ fontSize: '0.8rem', color: '#999', fontStyle: 'italic', padding: '8px 0' }}>
                        …and {reportAccounts.length - 50} more
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          ) : selectedState ? (
            <StateDetailPanel
              code={selectedState}
              accounts={accounts}
              onClose={onClosePanel}
              focusAccount={focusAccount}
              onFocusAccount={setFocusAccount}
              selectedCounty={selectedCounty}
              onSelectCounty={setSelectedCounty}
              onExport={onExport}
            />
          ) : (
            <OverviewPanel
              accounts={accounts}
              stateCounts={stateCounts}
              cityCounts={cityCounts}
              onSelectState={onSelectState}
              activeRecency={recency}
              setRecency={setRecency}
              recencyCounts={recencyCounts}
              onExport={onExport}
            />
          )}
        </aside>

        {/* CRM Detail Panel */}
        <CrmDetailPanel account={focusAccount} onClose={() => setFocusAccount(null)} />
      </div>
    </div>
  );
}

function topState(stateCounts) {
  let code = null, n = 0;
  for (const [k, v] of Object.entries(stateCounts)) {
    if (v > n) { n = v; code = k; }
  }
  return { code, n };
}

// Build up to 3 short insight strings for the current scope + metric.
function computeInsights(ctx) {
  const {
    metric, denom, selectedState, selectedCounty, accounts, stateCounts, countyCounts,
    STATE_STATS, COUNTY_STATS, countyNameByFips, recencyCounts, stateScope
  } = ctx;
  const cfg = DENOM_CFG[denom];
  const out = [];

  if (selectedCounty) {
    // Single-county breakdown
    const list = accounts.filter(a => (a.countyFips || '') === selectedCounty);
    const n = list.length;
    const cities = new Set(list.map(a => (a.city || '').trim().toUpperCase()).filter(Boolean)).size;
    let hot = 0, stale = 0;
    for (const a of list) {
      const b = activityBand(daysAgo(a.lastActivity));
      if (b === 'hot') hot++;
      else if (b === 'cold') stale++;
    }
    const cc = {};
    for (const a of list) { const c = (a.city || '').trim(); if (c) cc[c] = (cc[c] || 0) + 1; }
    const top = Object.entries(cc).sort((a, b) => b[1] - a[1])[0];
    const st = COUNTY_STATS[selectedCounty];
    const dv = st ? st[denom] : 0;
    out.push(`${n} account${n === 1 ? '' : 's'} · ${cities} ${cities === 1 ? 'city' : 'cities'}`);
    if (n) out.push(`${Math.round(hot / n * 100)}% active · ${Math.round(stale / n * 100)}% stale`);
    if (top) out.push(`Top city: ${titleCase(top[0])} (${top[1]})`);
    if (dv > 0) out.push(`${fmtRate(n / dv * cfg.k, denom)} ${cfg.unitLabel}`);
    return out.slice(0, 4);
  }

  if (!selectedState) {
    out.push(`${accounts.length} accounts across ${Object.keys(stateCounts).length} states`);
    if (recencyCounts.all) out.push(`${Math.round(recencyCounts.cold / recencyCounts.all * 100)}% stale (1y+)`);
    // Opportunity, by the active denominator
    let gapCode = null, gapVal = 0;
    for (const code of Object.keys(STATE_STATS)) {
      const n = stateCounts[code] || 0;
      const dv = STATE_STATS[code][denom] || 0;
      if (n === 0 && dv > gapVal) { gapVal = dv; gapCode = code; }
    }
    if (gapCode) {
      out.push(`Biggest open market: ${STATE_NAME[gapCode] || gapCode} (${compactNum(gapVal)} ${cfg.label.toLowerCase()}, 0 accounts)`);
    } else {
      let lowCode = null, lowRate = Infinity;
      for (const code of Object.keys(stateCounts)) {
        const dv = (STATE_STATS[code] || {})[denom] || 0;
        if (stateCounts[code] > 0 && dv > 0) {
          const r = stateCounts[code] / dv;
          if (r < lowRate) { lowRate = r; lowCode = code; }
        }
      }
      if (lowCode) out.push(`Lowest penetration: ${STATE_NAME[lowCode]} (${fmtRate(lowRate * cfg.k, denom)}${cfg.pct ? '' : ' ' + cfg.unitLabel})`);
    }
  } else {
    const sf = CODE_TO_FIPS[selectedState];
    const totalCounties = Object.keys(COUNTY_STATS).filter(f => f.slice(0, 2) === sf).length;
    if (stateScope) {
      out.push(`${stateScope.accounts} accounts in ${stateScope.counties} of ${totalCounties} counties`);
      if (stateScope.topName) out.push(`Top county: ${stateScope.topName} (${stateScope.topN})`);
    }
    let gapFips = null, gapVal = 0;
    for (const fips of Object.keys(COUNTY_STATS)) {
      if (fips.slice(0, 2) !== sf) continue;
      const n = countyCounts[fips] || 0;
      const dv = COUNTY_STATS[fips][denom] || 0;
      if (n === 0 && dv > gapVal) { gapVal = dv; gapFips = fips; }
    }
    if (gapFips && countyNameByFips[gapFips]) {
      out.push(`Biggest open county: ${shortCounty(countyNameByFips[gapFips])} (${compactNum(gapVal)} ${cfg.label.toLowerCase()})`);
    }
  }
  return out.slice(0, 3);
}

function topCityForState(code, accounts) {
  const m = {};
  for (const a of accounts) {
    if (a.state !== code) continue;
    const c = (a.city || '').trim();
    if (!c) continue;
    m[c] = (m[c] || 0) + 1;
  }
  const top = Object.entries(m).sort((a, b) => b[1] - a[1])[0];
  if (!top) return null;
  return `${titleCase(top[0])} (${top[1]})`;
}

function topCityForCounty(fips, accounts) {
  const m = {};
  for (const a of accounts) {
    if (a.countyFips !== fips) continue;
    const c = (a.city || '').trim();
    if (!c) continue;
    m[c] = (m[c] || 0) + 1;
  }
  const top = Object.entries(m).sort((a, b) => b[1] - a[1])[0];
  if (!top) return null;
  return `${titleCase(top[0])} (${top[1]})`;
}

// ------------------------------------------------------------------
// CRM Detail Panel — slides over from right when a pin is clicked
// ------------------------------------------------------------------
function CrmDetailPanel({ account, onClose }) {
  if (!account) return null;
  const tierColors = { 'strong-buy': '#22c55e', watchlist: '#eab308', pass: '#ef4444' };
  const tierLabels = { 'strong-buy': 'Prime', watchlist: 'Possible', pass: 'Poor' };
  const stageLabels = {
    no_contact: 'No Contact', outreach_started: 'Outreach Started',
    initial_contact: 'Initial Contact', relationship_established: 'Relationship Established',
    prep: 'Prep', market: 'Market', loi: 'LOI', close: 'Close',
  };
  const dAgo = account.lastActivity ? Math.floor((Date.now() - new Date(account.lastActivity).getTime()) / 86400000) : null;

  return (
    <div style={{
      position: 'fixed', top: 0, right: 0, width: 360, height: '100vh',
      background: '#fff', boxShadow: '-4px 0 20px rgba(0,0,0,0.15)',
      zIndex: 9999, overflowY: 'auto', padding: '20px 24px',
      fontFamily: 'var(--ff-body, Nunito Sans, sans-serif)',
      borderLeft: '3px solid var(--sells-gold, #EFB64E)',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: '1.1rem', fontWeight: 700, color: 'var(--sells-blue, #102772)' }}>{account.name}</div>
          <div style={{ fontSize: '0.85rem', color: '#666', marginTop: 2 }}>{[account.city, account.state].filter(Boolean).join(', ')}</div>
          {account.street && <div style={{ fontSize: '0.8rem', color: '#999', marginTop: 2 }}>{account.street}</div>}
        </div>
        <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 22, cursor: 'pointer', color: '#999', padding: '0 4px' }}>&times;</button>
      </div>

      {/* Score + Tier */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        {account.score != null && (
          <span style={{ padding: '3px 10px', borderRadius: 4, fontSize: '0.8rem', fontWeight: 700,
            background: (tierColors[account.tier] || '#999') + '20', color: tierColors[account.tier] || '#999' }}>
            {account.score.toFixed(1)} — {tierLabels[account.tier] || account.tier || '—'}
          </span>
        )}
        <span style={{ padding: '3px 10px', borderRadius: 4, fontSize: '0.75rem', fontWeight: 600,
          background: '#f0f0f0', color: '#555' }}>
          {stageLabels[account.pipeline_stage] || account.pipeline_stage || 'No Contact'}
        </span>
      </div>

      {/* Key fields */}
      <div style={{ display: 'grid', gap: 10, fontSize: '0.85rem' }}>
        {account.industry && <div><span style={{ fontWeight: 600, color: '#444' }}>Industry:</span> {account.industry}</div>}
        {account.owner && <div><span style={{ fontWeight: 600, color: '#444' }}>Owner:</span> {account.owner}</div>}
        {account.phone && <div><span style={{ fontWeight: 600, color: '#444' }}>Phone:</span> <a href={'tel:' + account.phone}>{account.phone}</a></div>}
        {account.email && <div><span style={{ fontWeight: 600, color: '#444' }}>Email:</span> <a href={'mailto:' + account.email}>{account.email}</a></div>}
        <div>
          <span style={{ fontWeight: 600, color: '#444' }}>Last Activity:</span>{' '}
          {account.lastActivity ? <span>{account.lastActivity} ({dAgo}d ago)</span> : <span style={{ color: '#bbb' }}>No contact yet</span>}
        </div>
        {account.last_contacted_by && (
          <div><span style={{ fontWeight: 600, color: '#444' }}>Last Contacted By:</span> {account.last_contacted_by}</div>
        )}
      </div>

      {/* Action buttons */}
      <MapActionButtons account={account} />
    </div>
  );
}

function MapActionButtons({ account }) {
  const [showMandates, setShowMandates] = React.useState(false);
  const [mandates, setMandates] = React.useState([]);
  const [addedToQueue, setAddedToQueue] = React.useState(false);
  const [addedToMandate, setAddedToMandate] = React.useState(null);

  const loadMandates = React.useCallback(async () => {
    if (mandates.length > 0) { setShowMandates(!showMandates); return; }
    try {
      const res = await fetch('/api/mandates');
      const data = await res.json();
      setMandates(data.mandates || []);
      setShowMandates(true);
    } catch { setMandates([]); setShowMandates(true); }
  }, [mandates, showMandates]);

  const addToQueue = () => {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'map-add-to-queue', companyId: account.id, companyName: account.name }, '*');
    }
    setAddedToQueue(true);
    setTimeout(() => setAddedToQueue(false), 2000);
  };

  const addToMandate = async (mandateId, mandateName) => {
    try {
      await fetch(`/api/mandates/${mandateId}/companies`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company_ids: [account.id] }),
      });
      setAddedToMandate(mandateName);
      setTimeout(() => setAddedToMandate(null), 2000);
    } catch {}
  };

  return (
    <div style={{ marginTop: 20, display: 'flex', flexDirection: 'column', gap: 8 }}>
      <button onClick={() => { addToQueue(); loadMandates(); }}
        style={{
          width: '100%', padding: '10px 0', background: addedToQueue ? '#22c55e' : 'var(--sells-gold, #EFB64E)',
          color: addedToQueue ? '#fff' : 'var(--sells-blue, #102772)', border: 'none', borderRadius: 6,
          fontSize: '0.9rem', fontWeight: 600, cursor: 'pointer', transition: 'background 0.2s',
        }}>
        {addedToQueue ? '✓ Added to Queue' : '+ Add to Call Queue'}
      </button>

      {showMandates && (
        <div style={{ background: '#f8f7f2', borderRadius: 6, padding: 10, border: '1px solid #e5e2d8' }}>
          <div style={{ fontSize: '0.75rem', fontWeight: 600, color: '#888', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>
            Also add to a mandate:
          </div>
          {mandates.length === 0 ? (
            <div style={{ fontSize: '0.8rem', color: '#aaa', fontStyle: 'italic' }}>No mandates found</div>
          ) : mandates.map(m => (
            <button key={m.id} onClick={() => addToMandate(m.id, m.buyer_name)}
              style={{
                display: 'block', width: '100%', textAlign: 'left', padding: '6px 8px', marginBottom: 4,
                background: addedToMandate === m.buyer_name ? '#22c55e' : '#fff', color: addedToMandate === m.buyer_name ? '#fff' : '#333',
                border: '1px solid #ddd', borderRadius: 4, fontSize: '0.82rem', cursor: 'pointer', transition: 'background 0.2s',
              }}>
              {addedToMandate === m.buyer_name ? '✓ Added' : m.buyer_name}
            </button>
          ))}
        </div>
      )}

      <button
        onClick={() => {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'map-open-company', companyId: account.id }, '*');
          }
        }}
        style={{
          width: '100%', padding: '10px 0', background: 'var(--sells-blue, #102772)',
          color: '#fff', border: 'none', borderRadius: 6, fontSize: '0.9rem', fontWeight: 600, cursor: 'pointer',
        }}>
        Open in CRM
      </button>
    </div>
  );
}

root.render(<App />);
// Allow data script to trigger re-render after async fetch
window.__MAP_RERENDER = () => root.render(<App />);

</script>
