/* ==========================================================================
   Sells — Colors & Type tokens
   Source of truth: Sells brand standards (Bronson Ma Creative, LLC)
   ========================================================================== */

/* --- Fonts: served from Google Fonts (matches brand-approved specimens) --- */
@import url('https://fonts.googleapis.com/css2?family=Roboto+Serif:ital,opsz,wght@0,8..144,300;0,8..144,400;0,8..144,500;0,8..144,600;0,8..144,700;0,8..144,800;1,8..144,300;1,8..144,400;1,8..144,500;1,8..144,600;1,8..144,700&family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,500;0,6..12,600;0,6..12,700;0,6..12,800;1,6..12,300;1,6..12,400;1,6..12,600&family=Georgia&display=swap');

:root {
  /* =====================================================================
     PRIMARY COLORS — per brand standards p. 33 (rev. May 2026)
     ---------------------------------------------------------------------
     Three tiers:
       · Primary    — Blue + Gold (the brand's heart)
       · Secondary  — Gray + Copper (supporting)
       · Tertiary   — Light Blue, Light Gray, Purple, Green (supplemental)
     ===================================================================== */

  /* Primary */
  --sells-blue:        #102772;  /* Primary Navy — PMS 281; CMYK 99/75/3/25  */
  --sells-gold:        #EFB64E;  /* PMS 7555 — primary brand gold            */
  --sells-gold-bright: #EA9D13;  /* bright gold (theme md + site "S")        */
  --sells-white:       #FFFFFF;

  /* Secondary */
  --sells-gray:        #494840;  /* PMS 418 — warm dark gray, body copy      */
  --sells-copper:      #B37F2B;  /* PMS 7558 — dark gold / contrast text     */

  /* Tertiary — supplemental accents */
  --sells-light-blue:  #708DE0;  /* PMS 2123 */
  --sells-light-gray:  #8E8C82;  /* PMS 2332 */
  --sells-purple:      #763F8A;  /* PMS 242  */
  --sells-green:       #8EC039;  /* PMS 376  */

  /* Sherwin-Williams paint matches (environmental / wall painting only) */
  --sw-commodore:      "SW 6524";   /* navy   — matches --sells-blue        */
  --sw-trinket:        "SW 6685";   /* light blue — matches --sells-light-blue */
  --sw-sconce-gold:    "SW 6398";   /* gold   — matches --sells-gold        */
  --sw-urbane-bronze:  "SW 7048";   /* copper — matches --sells-copper      */

  /* Semi-transparent gold (used in logo and overlays, 75% per standards) */
  --sells-gold-75:     rgba(239, 182, 78, 0.75);
  --sells-gold-b-75:   rgba(234, 157, 19, 0.75);

  /* =====================================================================
     TINTS — derived from primary blue for backgrounds, tables, cards
     ===================================================================== */
  --sells-blue-900:    #0B1C55;   /* deeper navy, pressed/hover on dark   */
  --sells-blue-800:    #102772;   /* = primary */
  --sells-blue-700:    #1F3864;   /* internal-system navy variant         */
  --sells-blue-500:    #4A5D99;
  --sells-blue-300:    #8A96BD;
  --sells-blue-100:    #D6E4F0;   /* light blue — alt table row / tints   */
  --sells-blue-050:    #EEF3FA;

  /* Warm neutral scale (derived from gray #494840) */
  --sells-gray-900:    #2A2923;
  --sells-gray-800:    #3B3A33;
  --sells-gray-700:    #494840;   /* = primary body gray */
  --sells-gray-500:    #7A7A72;
  --sells-gray-300:    #B8B8B0;
  --sells-gray-200:    #D8D7CE;
  --sells-gray-100:    #EDECE4;
  --sells-gray-050:    #F7F6F0;   /* off-white warm page bg */

  /* =====================================================================
     PATTERN TONAL SHADES (DERIVED — DISPLAY EXTENSION ONLY)
     ---------------------------------------------------------------------
     These are derivative shades used by the unofficial *display pattern*
     (full-bleed brick tessellation on lobby TVs / large-format ambient
     surfaces). They are NOT part of the official primary / secondary /
     tertiary palette, and should not be used in marketing, web, deck,
     print, or any standard surface.
     See README.md → "Pattern → Display pattern (unofficial extension)".
     ===================================================================== */
  --pattern-navy-base:      #102772;  /* base navy (matches --sells-blue) */
  --pattern-navy-diamond:   #162C75;  /* +1 step lighter — the 3 S diamonds */
  --pattern-navy-wing:      #1B3079;  /* +2 steps lighter — the 2 S wings   */
  --pattern-warm-base:      #F7F6F0;  /* base warm (matches --sells-gray-050) */
  --pattern-warm-diamond:   #EFEBE0;  /* −1 step darker — the 3 S diamonds */
  --pattern-warm-wing:      #E8E2D2;  /* −2 steps darker — the 2 S wings    */

  /* =====================================================================
     SEMANTIC — Foreground / Background / Accent
     ===================================================================== */
  --fg-1:              var(--sells-blue);         /* headlines, primary   */
  --fg-2:              var(--sells-gray-700);     /* body copy            */
  --fg-3:              var(--sells-gray-500);     /* muted, captions      */
  --fg-inverse:        #FFFFFF;
  --fg-accent:         var(--sells-copper);       /* emphasis on light bg */
  --fg-link:           var(--sells-blue);
  --fg-link-hover:     var(--sells-blue-900);

  --bg-page:           #FFFFFF;
  --bg-muted:          var(--sells-blue-050);
  --bg-tint:           var(--sells-blue-100);
  --bg-dark:           var(--sells-blue);
  --bg-dark-alt:       var(--sells-blue-900);
  --bg-card:           #FFFFFF;

  --accent:            var(--sells-gold);
  --accent-strong:     var(--sells-gold-bright);
  --accent-muted:      var(--sells-gold-75);

  --border-subtle:     var(--sells-gray-100);
  --border-default:    var(--sells-gray-200);
  --border-strong:     var(--sells-gray-300);
  --border-on-dark:    rgba(255, 255, 255, 0.16);

  /* =====================================================================
     TYPOGRAPHY — Roboto Serif + Nunito Sans
     Georgia is the secondary/fallback per older theme spec.
     ===================================================================== */
  --font-serif:    "Roboto Serif", Georgia, "Times New Roman", serif;
  --font-sans:     "Nunito Sans", -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Helvetica, Arial, sans-serif;
  --font-georgia:  Georgia, "Times New Roman", serif;
  --font-mono:     ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  /* Type scale (desktop) — scales down a touch on mobile where needed    */
  --text-xs:    12px;
  --text-sm:    14px;
  --text-base:  16px;
  --text-md:    18px;
  --text-lg:    20px;
  --text-xl:    24px;
  --text-2xl:   32px;
  --text-3xl:   40px;
  --text-4xl:   48px;
  --text-5xl:   64px;
  --text-display: 84px;

  /* Leading */
  --lh-tight:   1.1;
  --lh-snug:    1.25;
  --lh-normal:  1.45;
  --lh-relaxed: 1.65;

  /* Tracking */
  --tr-tight:     -0.02em;
  --tr-normal:     0;
  --tr-wide:       0.06em;
  --tr-wider:      0.14em;  /* used in ALL-CAPS eyebrow / section labels  */

  /* =====================================================================
     SPACING (8px grid)
     ===================================================================== */
  --s-0:   0;
  --s-1:   4px;
  --s-2:   8px;
  --s-3:   12px;
  --s-4:   16px;
  --s-5:   24px;
  --s-6:   32px;
  --s-7:   48px;
  --s-8:   64px;
  --s-9:   96px;
  --s-10:  128px;

  /* =====================================================================
     RADII, SHADOWS, MOTION
     ===================================================================== */
  --radius-0:    0;
  --radius-sm:   2px;
  --radius-md:   4px;
  --radius-lg:   8px;
  --radius-pill: 999px;

  /* Sells visual language favors sharp corners and restrained shadows.
     Diamond motif + rectangular cards dominate — avoid large rounded
     "app-y" shapes. */

  --shadow-xs:   0 1px 2px rgba(16, 39, 114, 0.06);
  --shadow-sm:   0 2px 6px rgba(16, 39, 114, 0.08);
  --shadow-md:   0 6px 20px rgba(16, 39, 114, 0.10);
  --shadow-lg:   0 16px 40px rgba(16, 39, 114, 0.14);

  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast:    140ms;
  --dur-med:     240ms;
  --dur-slow:    420ms;

  /* Containers */
  --container-narrow:  720px;
  --container-default: 1120px;
  --container-wide:    1280px;
}

/* ==========================================================================
   SEMANTIC TEXT STYLES
   ========================================================================== */

.h-display,
.sells-h-display {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: clamp(48px, 6vw, var(--text-display));
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
  color: var(--fg-1);
}

/* global React, ReactDOM, d3, topojson */

const STATE_NAME = {

// FIPS (numeric id from us-atlas) → state code
const FIPS_TO_CODE = {
  '01':'AL','02':'AK','04':'AZ','05':'AR','06':'CA','08':'CO','09':'CT','10':'DE',

  '45':'SC','46':'SD','47':'TN','48':'TX','49':'UT','50':'VT','51':'VA','53':'WA',
  '54':'WV','55':'WI','56':'WY','60':'AS','66':'GU','69':'MP','72':'PR','78':'VI'
};

// 5-bin sequential navy ramp (light → deep)
const RAMP = ['#EEF3FA', '#D6E4F0', '#8A96BD', '#4A5D99', '#102772'];
function binColor(n) {
  if (!n) return '#F0EFE7';            // empty — warm light gray
  if (n <= 5) return RAMP[1];
  if (n <= 15) return RAMP[2];
  if (n <= 30) return RAMP[3];
  return RAMP[4];
}
const BIN_LABELS = [
  { range: '1–5',   color: RAMP[1] },
  { range: '6–15',  color: RAMP[2] },
  { range: '16–30', color: RAMP[3] },
  { range: '31+',   color: RAMP[4] }
];

// USPS code → 2-digit state FIPS (reverse of FIPS_TO_CODE) for county filtering
const CODE_TO_FIPS = Object.fromEntries(
  Object.entries(FIPS_TO_CODE).map(([fips, code]) => [code, fips])
);

// County counts are an order of magnitude smaller than state counts — tighter bins.
function binCountyColor(n) {
  if (!n) return '#F0EFE7';
  if (n <= 2) return RAMP[1];
  if (n <= 5) return RAMP[2];
  if (n <= 10) return RAMP[3];
  return RAMP[4];
}
const COUNTY_BIN_LABELS = [
  { range: '1–2',  color: RAMP[1] },
  { range: '3–5',  color: RAMP[2] },
  { range: '6–10', color: RAMP[3] },
  { range: '11+',  color: RAMP[4] }
];
function shortCounty(name) {
  return name ? name.replace(/\s+(County|Parish|Borough|Census Area|Municipality|City and Borough)$/i, '') : name;
}
function shortPlace(name) {
  return name ? name.replace(/\s+(city|town|village|borough|CDP|municipality)$/i, '') : (name || '');
}

// ------------------------------------------------------------------
// Metric modes: count | percap (per-capita) | gap (white space)
// Denominators come from window.COUNTY_STATS / STATE_STATS (Census).
// ------------------------------------------------------------------
const DENOM_CFG = {
  pop:  { label: 'People',     unitLabel: 'per 100k people',   k: 100000, pct: false },
  biz:  { label: 'Businesses', unitLabel: 'per 1k businesses', k: 1000,   pct: false }
};
// Warm copper ramp for "white space" / opportunity (vs. the navy presence ramp)
const COPPER_RAMP = ['#F0EFE7', '#EAD9B0', '#DDBF77', '#CFA044', '#B37F2B'];

function compactNum(n) {
  if (n == null) return '—';
  if (n >= 1e6) return (n / 1e6).toFixed(n >= 1e7 ? 0 : 1) + 'M';
  if (n >= 1e3) return Math.round(n / 1e3) + 'k';
  return String(Math.round(n));
}
function fmtRate(v, denom) {
  if (v == null) return '—';
  if (DENOM_CFG[denom].pct) return (v < 10 ? v.toFixed(1) : Math.round(v)) + '%';
  return v >= 10 ? String(Math.round(v)) : v.toFixed(1);
}
// One-line metric summary for tooltips (null in plain count mode).
function metricLineFor(metric, denom, n, denomVal) {
  const cfg = DENOM_CFG[denom];
  if (metric === 'percap') {
    if (!denomVal) return `no ${cfg.label.toLowerCase()} data`;
    const v = (n / denomVal) * cfg.k;
    return cfg.pct ? `${fmtRate(v, denom)} of pest-control firms` : `${fmtRate(v, denom)} ${cfg.unitLabel}`;
  }
  if (metric === 'gap') {
    if (n > 0) return 'has coverage';
    if (!denomVal) return null;
    return `Open market · ${compactNum(denomVal)} ${cfg.label.toLowerCase()}`;
  }
  return null;
}

// Build a choropleth view (fill per region + legend) for the active metric.
// ids: region ids; countById: accounts per region; statById: denominators per region.
function buildMetricView({ ids, countById, statById, metric, denom }) {
  const cfg = DENOM_CFG[denom];
  const fillById = {};
  const valueById = {};

  if (metric === 'count') {
    // absolute bins (existing behaviour) — caller picks the right binner
    return null; // signal: use existing binColor path
  }

  const ramp = metric === 'gap' ? COPPER_RAMP : RAMP;
  const elig = [];
  for (const id of ids) {
    const n = countById[id] || 0;
    const st = statById[id];
    const dv = st ? st[denom] : 0;
    if (metric === 'percap') {
      if (n > 0 && dv > 0) { const v = (n / dv) * cfg.k; valueById[id] = v; elig.push(v); }
    } else { // gap = regions with zero accounts, sized by opportunity (denominator)
      if (n === 0 && dv > 0) { valueById[id] = dv; elig.push(dv); }
    }
  }
  elig.sort((a, b) => a - b);
  const q = (p) => (elig.length ? elig[Math.min(elig.length - 1, Math.floor(p * elig.length))] : 0);
  const breaks = [q(0.25), q(0.5), q(0.75)];
  const colorOf = (v) => {
    if (v <= breaks[0]) return ramp[1];
    if (v <= breaks[1]) return ramp[2];
    if (v <= breaks[2]) return ramp[3];
    return ramp[4];
  };
  for (const id of ids) {
    fillById[id] = (id in valueById) ? colorOf(valueById[id]) : '#F0EFE7';
  }

  // Legend (4 bins)
  const fmt = metric === 'gap' ? (x) => compactNum(x) : (x) => fmtRate(x, denom);
  const items = [
    { color: ramp[1], range: `≤ ${fmt(breaks[0])}` },
    { color: ramp[2], range: `${fmt(breaks[0])}–${fmt(breaks[1])}` },
    { color: ramp[3], range: `${fmt(breaks[1])}–${fmt(breaks[2])}` },
    { color: ramp[4], range: `${fmt(breaks[2])}+` }
  ];
  const label = metric === 'gap'
    ? `Open market · ${cfg.label.toLowerCase()}`
    : (cfg.pct ? 'Market share' : `Accounts ${cfg.unitLabel}`);

  return { fillById, valueById, breaks, label, items };
}

// Helpers
// ------------------------------------------------------------------
const TODAY = new Date('2026-05-25');
function daysAgo(iso) {
  if (!iso) return null;
  return Math.floor((TODAY - new Date(iso)) / 86400000);
}
function formatDaysAgo(d) {
  if (d == null) return '—';
  if (d < 1) return 'Today';
  if (d < 30) return `${d}d ago`;
  if (d < 365) return `${Math.floor(d/30)}mo ago`;
  return `${(d/365).toFixed(1)}y ago`;
}
function activityBand(d) {
  if (d == null) return 'nocontact';
  if (d <= 90) return 'hot';
  if (d <= 365) return 'warm';
  return 'cold';
}
function titleCase(s) {
  if (!s) return '';
  return s.toLowerCase().replace(/\b([a-z])/g, (_, c) => c.toUpperCase());
}
function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}
// CSV export helpers
function buildCsv(rows) {
  const cols = ['name', 'street', 'city', 'state', 'zip', 'county', 'lastActivity', 'lastModified'];
  const esc = (v) => {
    v = v == null ? '' : String(v);
    return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
  };
  const header = cols.join(',');
  const lines = rows.map(r => cols.map(c => esc(r[c])).join(','));
  return header + '\n' + lines.join('\n');
}
function downloadCsv(filename, text) {
  const blob = new Blob([text], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
// Deterministic small offset so accounts sharing a fallback centroid don't fully overlap.
function jitter(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) | 0;
  const ang = ((h % 1000) / 1000) * Math.PI * 2;
  const rad = 4 + (Math.abs(h >> 10) % 7);
  return [Math.cos(ang) * rad, Math.sin(ang) * rad];
}

function CreateCampaignButton({ accounts }) {
  const [creating, setCreating] = React.useState(false);
  const onClick = async () => {
    if (accounts.length === 0) { alert('No accounts in current view to create a campaign from.'); return; }
    if (!confirm(`Create a campaign with ${accounts.length} account${accounts.length === 1 ? '' : 's'} from the current map view?`)) return;

    try {
      // Message parent CRM to create campaign with these company IDs
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'map-create-campaign',
          companyIds: accounts.filter(a => a.id).map(a => a.id),
          count: accounts.length,
        }, '*');
      }
    } catch (err) {
      alert('Failed to create campaign: ' + err.message);
    }
    setCreating(false);
  };
  return (
    <button className="export-btn" onClick={onClick} disabled={creating} title="Create a campaign from current filtered accounts"
      style={{ background: 'var(--sells-blue, #102772)', color: '#fff', borderColor: 'var(--sells-blue, #102772)' }}>

        <path d="M12 5v14m-7-7h14" />
      </svg>
      {creating ? 'Creating...' : 'Campaign'}
    </button>
  );
}

// ------------------------------------------------------------------
// Map (SVG choropleth via d3-geo)
// ------------------------------------------------------------------
const MAP_W = 975, MAP_H = 610; // matches us-atlas Albers viewBox

const ChoroplethMap = React.memo(function ChoroplethMap({ stateCounts, selectedState, onSelectState, onHoverState, statesGeo, dimEmpty, fillMap, showLabels, reportMode, selectedStates }) {
  const pathGen = useMemo(() => {
    if (!statesGeo) return null;
    // us-atlas data on jsdelivr ships in raw lat/lng — project to fit our viewBox.
    const projection = d3.geoAlbersUsa()
      .scale(1300)
      .translate([MAP_W / 2, MAP_H / 2]);
    return d3.geoPath(projection);
  }, [statesGeo]);

  if (!statesGeo) {
    return <div className="map-loading">Loading map…</div>;
  }

  return (
    <svg className="map-svg" viewBox={`0 0 ${MAP_W} ${MAP_H}`} preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="state-shadow" x="-2%" y="-2%" width="104%" height="104%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" />
          <feOffset dy="1" />
          <feComponentTransfer><feFuncA type="linear" slope="0.18" /></feComponentTransfer>
          <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>

      <g>
        {statesGeo.features.map((f) => {
          const code = FIPS_TO_CODE[String(f.id).padStart(2, '0')];
          const count = stateCounts[code] || 0;
          const isSel = selectedState === code;
          const isReportSel = reportMode && selectedStates && selectedStates.has(code);
          const isEmpty = !count;
          const isDim = dimEmpty && !count && !isSel;
          const fill = isReportSel ? 'var(--sells-gold, #EFB64E)' : isSel ? RAMP[4] : (fillMap ? (fillMap[code] || '#F0EFE7') : binColor(count));
          const classes = [
            'state',
            isEmpty ? 'is-empty' : '',
            isSel ? 'is-selected' : '',
            isDim ? 'is-dim' : ''
          ].filter(Boolean).join(' ');
          return (
            <path
              key={f.id}
              d={pathGen(f)}
              className={classes}
              fill={fill}
              onClick={() => count && onSelectState(code)}
              onMouseEnter={(e) => onHoverState(code, e)}
              onMouseMove={(e) => onHoverState(code, e)}
              onMouseLeave={() => onHoverState(null, null)}
            />
          );
        })}
      </g>

      {/* State labels for states with significant counts */}
      {showLabels && (
      <g>
        {statesGeo.features.map((f) => {
          const code = FIPS_TO_CODE[String(f.id).padStart(2, '0')];
          const count = stateCounts[code] || 0;
          if (!count) return null;
          const [cx, cy] = pathGen.centroid(f);
          if (!Number.isFinite(cx)) return null;
          const isDeep = count > 15;
          // Skip labels for tiny states unless they have big counts
          const bounds = pathGen.bounds(f);
          const w = bounds[1][0] - bounds[0][0];
          if (w < 28 && count < 10) return null;
          return (
            <g key={'lbl-' + f.id} pointerEvents="none">
              <text
                className={'state-label ' + (isDeep ? 'is-dark-bg' : 'is-light-bg')}
                x={cx}
                y={cy - 2}
              >
                {code}
              </text>
              <text
                className="state-count"
                x={cx}
                y={cy + 10}
                fill={isDeep ? '#EFB64E' : '#102772'}
              >
                {count}
              </text>
            </g>
          );
        })}
      </g>
      )}
    </svg>
  );
});

// ------------------------------------------------------------------
// County map (drill-down — fits a single state's counties to the stage)
// ------------------------------------------------------------------
const CountyMap = React.memo(function CountyMap({ stateCode, countiesGeo, countyCounts, selectedCounty, onSelectCounty, onHoverCounty, accounts, focusAccount, onHoverPin, onPinClick, fillMap, showLabels, placesGeo }) {
  const stateFips = CODE_TO_FIPS[stateCode];

  const zoomed = !!selectedCounty;
  const showPlaces = zoomed && placesGeo && placesGeo.features && placesGeo.features.length > 0;

  const { features, pathGen, projection, centroidByFips } = useMemo(() => {
    const empty = { features: [], pathGen: null, projection: null, centroidByFips: {} };
    if (!countiesGeo || !stateFips) return empty;
    const feats = countiesGeo.features.filter(
      f => String(f.id).padStart(5, '0').slice(0, 2) === stateFips
    );
    if (!feats.length) return empty;
    // geoAlbersUsa is a composite projection and can't fit a single sub-region;
    // use a plain conic Albers (Mercator for the offshore states) and fit to bounds.
    const proj = (stateCode === 'AK' || stateCode === 'HI')
      ? d3.geoMercator()
      : d3.geoAlbers();
    // Fit to the whole state, or zoom right into the selected county when one is chosen.
    const selFeat = selectedCounty
      ? feats.find(f => String(f.id).padStart(5, '0') === selectedCounty)
      : null;
    const fitTarget = selFeat ? selFeat : { type: 'FeatureCollection', features: feats };
    const pad = selFeat ? 80 : 32;
    proj.fitExtent([[pad, pad], [MAP_W - pad, MAP_H - pad]], fitTarget);
    const gp = d3.geoPath(proj);
    const cent = {};
    for (const f of feats) cent[String(f.id).padStart(5, '0')] = gp.centroid(f);
    return { features: feats, pathGen: gp, projection: proj, centroidByFips: cent };
  }, [countiesGeo, stateFips, stateCode, selectedCounty]);

  // Account pins — all of the state at the county level, or just the
  // selected county's accounts once you've zoomed in (so they declutter).
  const pins = useMemo(() => {
    if (!projection) return [];
    const out = [];
    for (const a of accounts) {
      if (a.state !== stateCode) continue;
      if (selectedCounty && (a.countyFips || '') !== selectedCounty) continue;
      let xy = null;
      if (a.lat != null && a.lng != null) {
        xy = projection([a.lng, a.lat]);
      } else if (a.countyFips && centroidByFips[a.countyFips]) {
        const c = centroidByFips[a.countyFips];
        const j = jitter(a.name);
        xy = [c[0] + j[0], c[1] + j[1]];
      }
      if (!xy || !Number.isFinite(xy[0])) continue;
      out.push({ a, x: xy[0], y: xy[1], band: activityBand(daysAgo(a.lastActivity)) });
    }
    return out;
  }, [accounts, stateCode, projection, centroidByFips, selectedCounty]);

  if (!countiesGeo) return <div className="map-loading">Loading counties…</div>;
  if (!features.length) return <div className="map-loading">No county geometry for {stateCode}.</div>;

  return (
    <svg className="map-svg" viewBox={`0 0 ${MAP_W} ${MAP_H}`} preserveAspectRatio="xMidYMid meet">
      <g>
        {/* When zoomed, render only the selected county — sibling paths project to
            enormous off-canvas shapes that are very expensive to rasterize. */}
        {(zoomed ? features.filter(f => String(f.id).padStart(5, '0') === selectedCounty) : features).map((f) => {
          const fips = String(f.id).padStart(5, '0');
          const count = countyCounts[fips] || 0;
          const isSel = selectedCounty === fips;
          const isEmpty = !count;
          const isDim = zoomed && !isSel;
          // When zoomed into a county, light fill so the pins read clearly;
          // siblings fade to faint context.
          const fill = zoomed
            ? (isSel ? '#FBFAF6' : '#ECEBE2')
            : (fillMap ? (fillMap[fips] || '#F0EFE7') : binCountyColor(count));
          const classes = [
            'county',
            isEmpty ? 'is-empty' : '',
            isSel ? 'is-selected' : '',
            isDim ? 'is-dim' : ''
          ].filter(Boolean).join(' ');
          return (
            <path
              key={fips}
              d={pathGen(f)}
              className={classes}
              fill={fill}
              onClick={() => count && onSelectCounty(isSel ? null : fips)}
              onMouseEnter={(e) => onHoverCounty(fips, e, f.properties && f.properties.name)}
              onMouseMove={(e) => onHoverCounty(fips, e, f.properties && f.properties.name)}
              onMouseLeave={() => onHoverCounty(null, null)}
            />
          );
        })}
      </g>

      {/* City / place boundaries (county-zoom only, lazy-loaded from TIGERweb) */}
      {showPlaces && (
        <g className="place-layer">
          {placesGeo.features.map((pf, i) => (
            <path key={'po-' + i} className="place-outline" d={pathGen(pf)} />
          ))}
          {placesGeo.features.map((pf, i) => {
            const c = pathGen.centroid(pf);
            if (!Number.isFinite(c[0])) return null;
            const bb = pathGen.bounds(pf);
            if ((bb[1][0] - bb[0][0]) < 26) return null; // skip tiny enclaves
            return (
              <text key={'pn-' + i} className="place-label" x={c[0]} y={c[1]} pointerEvents="none">
                {shortPlace(pf.properties && pf.properties.NAME)}
              </text>
            );
          })}
        </g>
      )}

      {/* County count labels — state level only */}
      {!zoomed && showLabels && (
      <g>
        {features.map((f) => {
          const fips = String(f.id).padStart(5, '0');
          const count = countyCounts[fips] || 0;
          if (!count) return null;
          const [cx, cy] = pathGen.centroid(f);
          if (!Number.isFinite(cx)) return null;
          const bounds = pathGen.bounds(f);
          const w = bounds[1][0] - bounds[0][0];
          if (w < 22 && count < 4) return null;
          const isDeep = count > 5 || selectedCounty === fips;
          return (
            <text
              key={'cc-' + fips}
              className={'county-count ' + (isDeep ? 'is-dark-bg' : 'is-light-bg')}
              x={cx}
              y={cy + 3}
              pointerEvents="none"
            >
              {count}
            </text>
          );
        })}
      </g>
      )}

      {/* Account pins (rendered on top so they capture hover) */}
      <g className="pin-layer">
        {pins.map(({ a, x, y, band }, i) => {
          const isFocus = focusAccount && focusAccount.name === a.name;
          const r = zoomed ? (isFocus ? 7 : 5) : (isFocus ? 6 : 3.5);
          // Company labels only when zoomed without city outlines (else city labels carry the context)
          const showLabel = zoomed && !showPlaces && pins.length <= 40;
          return (
            <g key={a.name + '|' + i}>
              <circle
                className={'map-pin map-pin--' + band + (zoomed ? ' is-zoom' : '') + (isFocus ? ' is-focus' : '')}
                cx={x}
                cy={y}
                r={r}
                onMouseEnter={(e) => onHoverPin(a, e)}
                onMouseMove={(e) => onHoverPin(a, e)}
                onMouseLeave={() => onHoverPin(null, null)}
                onClick={(e) => { e.stopPropagation(); onPinClick(a); }}
              />
              {showLabel && (
                <text className="pin-label" x={x + r + 3} y={y + 3} pointerEvents="none">
                  {truncate(a.name, 24)}
                </text>
              )}
            </g>
          );
        })}
      </g>
    </svg>
  );
});
